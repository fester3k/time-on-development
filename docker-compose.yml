services:
  cycle-monitor:
    build: ./service
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - cycle-data:/data
    environment:
      - DB_PATH=/data/cycle.db
      - STATE_X=In Progress           # <- nazwa stanu X w GH Project
      - GH_TOKEN=                     # <- PAT z uprawnieniem read:org + read:project
      - GH_GRAPHQL_URL=https://api.github.com/graphql  # <- dla GHES: https://ghes.example.com/api/graphql
      - WEBHOOK_SECRET=               # <- opcjonalny, ten sam co w ustawieniach webhooka w GH
      - ALLOWED_PROJECTS=             # <- PVT_aaa,PVT_bbb,...  (puste = akceptuj wszystkie)

volumes:
  cycle-data:
